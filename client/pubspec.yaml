name: remoteapp
description: Remote desktop, file transfer and video call app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  http: ^1.2.0
  dio: ^5.4.0

  # State management
  provider: ^6.1.2

  # Secure storage (for JWT token)
  flutter_secure_storage: ^9.0.0

  # UI
  google_fonts: ^6.2.1
  animate_do: ^3.3.4
  shimmer: ^3.0.0

  # Utils
  shared_preferences: ^2.2.2
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
